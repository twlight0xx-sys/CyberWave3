<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Classes</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* COLOR PALETTE: BRIGHT & NEON */
        :root { 
            --neon-green: #00ff41; 
            --electric-blue: #00d2ff; 
            --cyber-cyan: #00fff2;
            --bg: #05070a; 
            --sidebar: #000000; 
            --bright-red: #ff003c; 
        }
        
        /* THE SHARP RULE: 0PX RADIUS ONLY */
        * { 
            box-sizing: border-box; 
            font-family: 'Lexend', sans-serif; 
            margin: 0; 
            padding: 0; 
            border-radius: 0px !important; 
        }
        
        body, html { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* Login Screen */
        #gatekeeper { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999; background: var(--bg); }
        .auth-box { width: 400px; padding: 40px; background: #000; border: 2px solid #161b22; text-align: center; border-top: 4px solid var(--neon-green); box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #30363d; color: var(--neon-green); margin-bottom: 12px; outline: none; font-size: 12px; }
        .btn-login { width: 100%; padding: 14px; cursor: pointer; font-weight: bold; background: var(--neon-green); color: #000; border: none; text-transform: uppercase; }

        /* Workspace */
        #app { display: none; height: 100vh; width: 100%; }
        .shell { display: flex; height: 100vh; }
        .side-bar { width: 320px; background: var(--sidebar); border-right: 1px solid #161b22; padding: 25px; display: flex; flex-direction: column; }
        
        /* Direct Chat */
        .chat-container { flex: 1; margin-top: 25px; background: #000; border: 1px solid #161b22; display: flex; flex-direction: column; overflow: hidden; }
        .chat-title { background: #161b22; color: var(--electric-blue); font-size: 9px; padding: 8px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 11px; color: #ccc; }
        .msg { margin-bottom: 8px; border-left: 2px solid var(--cyber-cyan); padding: 5px 8px; background: rgba(0, 255, 242, 0.05); }
        .msg-user { color: var(--neon-green); font-weight: bold; font-size: 10px; }
        .chat-input-area { display: flex; border-top: 1px solid #161b22; }
        #msg-input { flex: 1; background: transparent; border: none; padding: 10px; color: #fff; font-size: 11px; outline: none; }
        #send-btn { background: var(--electric-blue); color: #000; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; font-size: 10px; }

        /* Main Content */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; background-image: radial-gradient(#161b22 0.8px, transparent 0.8px); background-size: 25px 25px; }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
        
        /* SEARCH BAR */
        .search-box { background: #000; border: 1px solid var(--electric-blue); padding: 20px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }
        .search-input { width: 100%; padding: 15px; background: #05070a; border: 1px solid #30363d; color: #fff; outline: none; font-size: 14px; }

        /* BRIGHT EDUCATIONAL GROUP */
        .collapsible-container { background: #000; border: 1px solid #30363d; border-top: 2px solid var(--cyber-cyan); }
        .collapsible-header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: transparent; border: none; color: #fff; font-weight: bold; }
        .collapsible-content { display: none; padding: 0 20px 20px 20px; border-top: 1px solid #30363d; background: #000; }
        
        .game-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #161b22; }
        
        /* BRIGHT GAME TITLES */
        .game-title span { color: var(--cyber-cyan); font-size: 16px; font-weight: bold; text-shadow: 0 0 8px rgba(0, 255, 242, 0.3); }
        .game-row:last-child .game-title span { text-decoration: underline; text-decoration-color: var(--electric-blue); }
        
        .btn-launch { background: transparent; border: 1px solid var(--electric-blue); color: var(--electric-blue); padding: 10px 22px; cursor: pointer; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .btn-launch:hover { background: var(--electric-blue); color: #000; }

        /* Fullscreen Shield */
        #ghost-shield { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        #ghost-shield iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: fixed; top: 10px; right: 10px; background: var(--bright-red); color: #fff; border: none; padding: 6px 12px; cursor: pointer; z-index: 10001; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="auth-box">
        <h1 style="color:var(--neon-green); font-size: 22px; letter-spacing: 3px;">CYBERWAVE</h1>
        <p style="color:#30363d; font-size: 10px; margin-bottom: 25px;">RESTRICTED ASSET PORTAL</p>
        <input type="text" id="user_id" placeholder="NODE_ID">
        <input type="password" id="sec_str" placeholder="PASS_KEY">
        <button class="btn-login" onclick="login()">[ AUTHORIZE_ACCESS ]</button>
    </div>
</div>

<div id="app">
    <div class="shell">
        <div class="side-bar">
            <h2 style="color:var(--neon-green); font-size: 14px; letter-spacing: 2px;">TERMINAL_SESS</h2>
            
            <div class="chat-container">
                <div class="chat-title">DIRECT_NODE_CHAT</div>
                <div id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Signal..." maxlength="100">
                    <button id="send-btn">SEND</button>
                </div>
            </div>

            <button style="margin-top:20px; background:transparent; border:1px solid var(--bright-red); color:var(--bright-red); padding:10px; cursor:pointer; font-size: 10px;" onclick="location.reload()">WIPE_LOCAL_SESS</button>
        </div>

        <div class="main-content">
            <div class="status-header">
                <div>
                    <h1 style="font-size: 24px; letter-spacing: 1.5px;">Universal Search</h1>
                    <p style="color: var(--electric-blue); font-size: 10px;">ENCRYPTED_TUNNEL: ACTIVE</p>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-bar" class="search-input" placeholder="Search the web or Enter URL..." onkeydown="if(event.key==='Enter') proxySearch()">
            </div>

            <div class="collapsible-container">
                <button class="collapsible-header" onclick="toggleCollapsible()">
                    <span style="letter-spacing: 1px;">Educational Games</span>
                    <span id="arrow">▼</span>
                </button>
                <div class="collapsible-content" id="assets-list">
                    <div class="game-row">
                        <div class="game-title"><span>Overcloaked</span><p style="color:#555; font-size:10px; margin-top:3px;">PRIMARY_LOGIC_NODE</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://overdih.netcrypto.org/')">OPEN_TUNNEL</button>
                    </div>
                    <div class="game-row">
                        <div class="game-title"><span>Overcloaked</span><p style="color:#555; font-size:10px; margin-top:3px;">SECONDARY_PROXY_NODE</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://mathedu.netcrypto.org/')">OPEN_TUNNEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="ghost-shield">
    <button class="close-btn" onclick="closeGhost()">TERMINATE (ESC)</button>
    <iframe id="ghost-frame"></iframe>
</div>

<script>
    // Database config
    const firebaseConfig = { databaseURL: "https://cyberwave-chat-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("messages");

    let currentUser = "User_" + Math.floor(Math.random() * 999);

    function login() { 
        const id = document.getElementById('user_id').value.trim();
        if(id) currentUser = id;
        document.getElementById('gatekeeper').style.display = 'none'; 
        document.getElementById('app').style.display = 'block'; 
    }

    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('msg-input').value;
        if(text.trim() !== "") {
            db.push().set({ user: currentUser, msg: text });
            document.getElementById('msg-input').value = "";
        }
    };

    db.limitToLast(25).on("child_added", (snapshot) => {
        const data = snapshot.val();
        const msgDiv = document.createElement("div");
        msgDiv.className = "msg";
        msgDiv.innerHTML = `<span class="msg-user">${data.user}:</span><br>${data.msg}`;
        document.getElementById('chat-messages').appendChild(msgDiv);
