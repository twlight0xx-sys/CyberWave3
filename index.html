<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Classes</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* THE ULTIMATE SHARP RESET */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            border-radius: 0px !important; 
            -webkit-border-radius: 0px !important;
            border-radius: 0 !important;
            text-decoration: none !important;
            outline: none !important;
        }

        :root { 
            --neon-green: #00ff41; 
            --electric-blue: #00d2ff; 
            --cyber-cyan: #00fff2;
            --bg: #05070a; 
            --sidebar: #000000; 
            --bright-red: #ff003c; 
        }
        
        body, html { 
            background: var(--bg); 
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Lexend', sans-serif;
        }

        /* Gatekeeper */
        #gatekeeper { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999; background: var(--bg); }
        .auth-box { width: 400px; padding: 40px; background: #000; border: 2px solid var(--neon-green); text-align: center; }
        input, textarea { width: 100%; padding: 14px; background: #000; border: 1px solid #30363d; color: var(--neon-green); margin-bottom: 12px; font-size: 12px; }

        /* Workspace */
        #app { display: none; height: 100vh; width: 100%; }
        .shell { display: flex; height: 100vh; }
        
        /* SIDEBAR UPDATED WITH TEXT THINGY */
        .side-bar { width: 320px; background: var(--sidebar); border-right: 1px solid #161b22; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-label { color: var(--neon-green); font-size: 10px; letter-spacing: 2px; font-weight: bold; }

        /* Chat Integration */
        .chat-container { height: 40%; background: #000; border: 1px solid #161b22; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 11px; color: #ccc; }
        .msg { margin-bottom: 8px; border-left: 2px solid var(--electric-blue); padding-left: 8px; }
        .chat-input-area { display: flex; border-top: 1px solid #161b22; }
        #msg-input { flex: 1; background: transparent; border: none; padding: 8px; color: #fff; font-size: 11px; margin: 0; }
        #send-btn { background: var(--electric-blue); color: #000; border: none; padding: 0 10px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* THE TEXT THINGY (Notepad) */
        .notepad-container { flex: 1; background: #000; border: 1px solid #161b22; display: flex; flex-direction: column; }
        #notepad { flex: 1; background: transparent; border: none; padding: 10px; color: var(--cyber-cyan); font-size: 11px; resize: none; width: 100%; height: 100%; margin: 0; }

        /* Main Area */
        .main-content { flex: 1; padding: 60px; overflow-y: auto; background-image: radial-gradient(#161b22 1px, transparent 1px); background-size: 30px 30px; }
        
        /* Search Bar Area */
        .search-box { background: #000; border: 2px solid var(--electric-blue); padding: 20px; margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px; background: #080a10; border: 1px solid #161b22; color: #fff; font-size: 14px; }

        /* Educational Games Group */
        .collapsible-container { background: #000; border: 1px solid #30363d; border-top: 3px solid var(--cyber-cyan); }
        .collapsible-header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: transparent; border: none; font-weight: bold; font-size: 14px; color: #FFFFFF !important; } /* FORCED WHITE */
        .collapsible-content { display: none; padding: 0 20px 20px 20px; border-top: 1px solid #30363d; background: #000; }
        
        .game-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #161b22; }
        .game-title span { color: var(--cyber-cyan); font-size: 16px; font-weight: bold; }
        
        .btn-launch { background: transparent; border: 2px solid var(--electric-blue); color: var(--electric-blue); padding: 10px 24px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-launch:hover { background: var(--electric-blue); color: #000; }

        /* Ghosting */
        #ghost-shield { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        #ghost-shield iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: fixed; top: 15px; right: 15px; background: var(--bright-red); color: #fff; border: none; padding: 8px 15px; cursor: pointer; z-index: 10001; font-weight: bold; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="auth-box">
        <h1 style="color:var(--neon-green); font-size: 24px; letter-spacing: 4px; margin-bottom: 30px;">CYBERWAVE</h1>
        <input type="text" id="user_id" placeholder="NODE_ID">
        <input type="password" id="sec_str" placeholder="PASS_KEY">
        <button class="btn-login" onclick="login()">[ MOUNT_SYSTEM ]</button>
    </div>
</div>

<div id="app">
    <div class="shell">
        <div class="side-bar">
            <p class="sidebar-label">NODE_COMMS</p>
            <div class="chat-container">
                <div id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Signal..." maxlength="100">
                    <button id="send-btn">SEND</button>
                </div>
            </div>

            <p class="sidebar-label">LOCAL_SCRATCHPAD</p>
            <div class="notepad-container">
                <textarea id="notepad" placeholder="Type notes here... (Clears on refresh)"></textarea>
            </div>

            <button style="background:transparent; border:1px solid var(--bright-red); color:var(--bright-red); padding:10px; cursor:pointer; font-size: 10px; font-weight: bold;" onclick="location.reload()">TERMINATE</button>
        </div>

        <div class="main-content">
            <h1 style="font-size: 26px; margin-bottom: 20px;">Terminal Search</h1>

            <div class="search-box">
                <input type="text" id="search-bar" class="search-input" placeholder="Proxy Search Query..." onkeydown="if(event.key==='Enter') proxySearch()">
            </div>

            <div class="collapsible-container">
                <button class="collapsible-header" onclick="toggleCollapsible()">
                    <span>Educational Games</span>
                    <span id="arrow">▼</span>
                </button>
                <div class="collapsible-content" id="assets-list">
                    <div class="game-row">
                        <div class="game-title"><span>Overcloaked</span><p style="color:#444; font-size:10px;">NODE_01</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://overdih.netcrypto.org/')">OPEN</button>
                    </div>
                    <div class="game-row">
                        <div class="game-title"><span>Overcloaked</span><p style="color:#444; font-size:10px;">NODE_02</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://mathedu.netcrypto.org/')">OPEN</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="ghost-shield">
    <button class="close-btn" onclick="closeGhost()">CLOSE (ESC)</button>
    <iframe id="ghost-frame"></iframe>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://cyberwave-chat-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("messages");
    let currentUser = "User_" + Math.floor(Math.random() * 999);

    function login() { 
        const id = document.getElementById('user_id').value.trim();
        if(id) currentUser = id;
        document.getElementById('gatekeeper').style.display = 'none'; 
        document.getElementById('app').style.display = 'block'; 
    }

    document.getElementById('send-btn').onclick = () => {
        const text = document.getElementById('msg-input').value;
        if(text.trim() !== "") {
            db.push().set({ user: currentUser, msg: text });
            document.getElementById('msg-input').value = "";
        }
    };

    db.limitToLast(20).on("child_added", (snapshot) => {
        const data = snapshot.val();
        const msgDiv = document.createElement("div");
        msgDiv.className = "msg";
        msgDiv.innerHTML = `<span style="color:var(--neon-green)">${data.user}:</span><br>${data.msg}`;
        document.getElementById('chat-messages').appendChild(msgDiv);
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
    });

    function proxySearch() {
        let input = document.getElementById('search-bar').value.trim();
        if (!input) return;
        let url = input.includes('.') && !input.includes(' ') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com/search?q=' + encodeURIComponent(input);
        ghostLaunch('https://overdih.netcrypto.org/proxy/' + url);
    }

    function ghostLaunch(url) {
        document.getElementById('ghost-shield').style.display = 'block';
        document.getElementById('ghost-frame').src = url;
    }

    function closeGhost() {
        document.getElementById('ghost-shield').style.display = 'none';
        document.getElementById('ghost-frame').src = 'about:blank';
    }

    function toggleCollapsible() {
        const content = document.getElementById('assets-list');
        const arrow = document.getElementById('arrow');
        const isOpen = content.style.display === "block";
        content.style.display = isOpen ? "none" : "block";
        arrow.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            if (document.getElementById('ghost-shield').style.display === 'block') {
                closeGhost();
            } else {
                window.location.replace("https://classroom.google.com");
            }
        }
    });
</script>
</body>
</html>
