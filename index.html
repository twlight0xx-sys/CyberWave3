<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Classes</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00ff41; --blue: #58a6ff; --bg: #05070a; --sidebar: #000000; --red: #ff3333; }
        
        /* SHARP CORNERS: All border-radius set to 0px */
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; margin: 0; padding: 0; border-radius: 0px !important; }
        
        body, html { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* Gatekeeper */
        #gatekeeper { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999; background: var(--bg); }
        .auth-box { width: 400px; padding: 40px; background: #000; border: 1px solid #161b22; text-align: center; border-top: 4px solid var(--green); }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #30363d; color: var(--green); margin-bottom: 12px; outline: none; font-size: 12px; }
        .btn-login { width: 100%; padding: 14px; cursor: pointer; font-weight: bold; background: var(--green); color: #000; border: none; text-transform: uppercase; }

        /* Workspace */
        #app { display: none; height: 100vh; width: 100%; }
        .shell { display: flex; height: 100vh; }
        .side-bar { width: 320px; background: var(--sidebar); border-right: 1px solid #161b22; padding: 25px; display: flex; flex-direction: column; }
        
        /* DIRECT CHAT EMBED */
        .chat-container { flex: 1; margin-top: 25px; background: #000; border: 1px solid #161b22; display: flex; flex-direction: column; overflow: hidden; }
        .chat-title { background: #161b22; color: var(--blue); font-size: 9px; padding: 8px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .chat-frame { width: 100%; height: 100%; border: none; }

        .main-content { flex: 1; padding: 60px; overflow-y: auto; background-image: radial-gradient(#161b22 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 20px; }

        /* SEARCH BAR */
        .search-box { background: #000; border: 1px solid var(--blue); padding: 20px; margin-bottom: 25px; }
        .search-input { width: 100%; padding: 15px; background: #05070a; border: 1px solid #30363d; color: #fff; outline: none; font-size: 14px; }

        /* COLLAPSIBLE */
        .collapsible-container { background: #000; border: 1px solid #30363d; }
        .collapsible-header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: transparent; border: none; color: #fff; font-weight: bold; }
        .collapsible-content { display: none; padding: 0 20px 20px 20px; border-top: 1px solid #30363d; background: #000; }
        
        .game-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #161b22; }
        .game-row:last-child .game-title { text-decoration: underline; text-decoration-color: var(--blue); }
        .btn-launch { background: transparent; border: 1px solid var(--blue); color: var(--blue); padding: 8px 18px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .btn-launch:hover { background: var(--blue); color: #000; }

        /* GHOST SHIELD */
        #ghost-shield { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        #ghost-shield iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: fixed; top: 10px; right: 10px; background: var(--red); color: #fff; border: none; padding: 5px 10px; cursor: pointer; z-index: 10001; font-size: 10px; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="auth-box">
        <h1 style="color:var(--green); font-size: 20px; letter-spacing: 2px;">CYBERWAVE</h1>
        <p style="color:#30363d; font-size: 10px; margin-bottom: 25px;">ROOT ACCESS REQUIRED</p>
        <input type="text" id="user_id" placeholder="NODE_ID">
        <input type="password" id="sec_str" placeholder="PASS_KEY">
        <button class="btn-login" onclick="login()">[ AUTHORIZE ]</button>
    </div>
</div>

<div id="app">
    <div class="shell">
        <div class="side-bar">
            <h2 style="color:var(--green); font-size: 14px; letter-spacing: 1px;">TERMINAL_SESS</h2>
            
            <div class="chat-container">
                <div class="chat-title">DIRECT_NODE_CHAT</div>
                <iframe class="chat-frame" src="https://www3.cbox.ws/box/?boxid=3534571&boxtag=cyberwave"></iframe>
            </div>

            <button style="margin-top:20px; background:transparent; border:1px solid var(--red); color:var(--red); padding:10px; cursor:pointer; font-size: 10px;" onclick="location.reload()">TERMINATE_ALL</button>
        </div>

        <div class="main-content">
            <div class="status-header">
                <div>
                    <h1 style="font-size: 22px; letter-spacing: 1px;">Universal Search</h1>
                    <p style="color: var(--blue); font-size: 10px;">ENCRYPTED_TUNNEL: ACTIVE</p>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="search-bar" class="search-input" placeholder="Search or Enter URL..." onkeydown="if(event.key==='Enter') proxySearch()">
            </div>

            <div class="collapsible-container">
                <button class="collapsible-header" onclick="toggleCollapsible()">
                    <span>Educational Games</span>
                    <span id="arrow">▼</span>
                </button>
                <div class="collapsible-content" id="assets-list">
                    <div class="game-row">
                        <div class="game-title"><span style="color:var(--blue);">Overcloaked</span><p style="color:#444; font-size:10px;">Node 1 - Ultra Stealth</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://overdih.netcrypto.org/')">OPEN</button>
                    </div>
                    <div class="game-row">
                        <div class="game-title"><span style="color:var(--blue);">Overcloaked</span><p style="color:#444; font-size:10px;">Node 2 - High Speed</p></div>
                        <button class="btn-launch" onclick="ghostLaunch('https://mathedu.netcrypto.org/')">OPEN</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="ghost-shield">
    <button class="close-btn" onclick="closeGhost()">CLOSE (ESC)</button>
    <iframe id="ghost-frame"></iframe>
</div>

<script>
    function login() { document.getElementById('gatekeeper').style.display = 'none'; document.getElementById('app').style.display = 'block'; }
    
    function proxySearch() {
        let input = document.getElementById('search-bar').value.trim();
        if (!input) return;
        let url = input.includes('.') && !input.includes(' ') ? (input.startsWith('http') ? input : 'https://' + input) : 'https://www.google.com/search?q=' + encodeURIComponent(input);
        ghostLaunch('https://overdih.netcrypto.org/proxy/' + url);
    }

    function ghostLaunch(url) {
        document.getElementById('ghost-shield').style.display = 'block';
        document.getElementById('ghost-frame').src = url;
    }

    function closeGhost() {
        document.getElementById('ghost-shield').style.display = 'none';
        document.getElementById('ghost-frame').src = 'about:blank';
    }

    function toggleCollapsible() {
        const content = document.getElementById('assets-list');
        const arrow = document.getElementById('arrow');
        if (content.style.display === "block") {
            content.style.display = "none";
            arrow.style.transform = "rotate(0deg)";
        } else {
            content.style.display = "block";
            arrow.style.transform = "rotate(180deg)";
        }
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            if (document.getElementById('ghost-shield').style.display === 'block') {
                closeGhost();
            } else {
                window.location.replace("https://classroom.google.com");
            }
        }
    });
</script>
</body>
</html>
